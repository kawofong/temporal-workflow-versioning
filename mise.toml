[tools]
python = "3.14.4"
uv = "0.10.12"
"npm:@marp-team/marp-cli" = "4.4.0"

[tasks."worker:v1"]
description = "Run Temporal Python worker v1"
dir = "python"
run = "uv run worker.py"
env = { BUILD_ID = "v1.0" }

[tasks."set-current-version"]
description = "Set the current worker deployment version"
usage = 'arg "<build-id>" help="Worker build ID to set as current (e.g. v1.0, v2.0)"'
run = "temporal worker deployment set-current-version --deployment-name card-service --build-id ${usage_build_id?} --yes"

[tasks."simulation"]
description = "Run the simulation Workflow"
dir = "python"
run = "uv run -m workflows.simulation"

[tasks."test"]
description = "Run Temporal workflow replay tests"
dir = "python"
run = "uv run pytest -v"

[tasks."slides"]
description = "Build presentation slides to presentations/dist/"
run = "marp docs/presentations/demo.md --html --output docs/presentations/demo.html"

[tasks."slides:watch"]
description = "Serve presentation slides with live reload"
run = "marp --server docs/presentations/"
